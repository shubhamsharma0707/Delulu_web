<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Delulu - Login</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#2b160a", "outline-variant": "#dec0ba", "on-surface": "#1b1c1c",
            "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#cbc5c2", "surface-bright": "#fbf9f8",
            "on-tertiary-fixed-variant": "#494644", "primary": "#a53b29", "surface-dim": "#dcd9d9",
            "on-primary-fixed-variant": "#842415", "tertiary-fixed": "#e7e1de", "error": "#ba1a1a",
            "error-container": "#ffdad6", "inverse-surface": "#303030", "on-surface-variant": "#57423e",
            "on-secondary-container": "#795a4a", "primary-fixed": "#ffdad4", "surface": "#fbf9f8",
            "outline": "#8b716d", "tertiary-container": "#a8a3a0", "on-primary-container": "#731709",
            "secondary-container": "#fdd4c0", "surface-container-low": "#f5f3f2", "surface-container": "#f0eded",
            "surface-tint": "#a53b29", "surface-container-highest": "#e4e2e1", "secondary-fixed-dim": "#e6beab",
            "on-background": "#1b1c1c", "on-error": "#ffffff", "secondary": "#765848",
            "on-primary-fixed": "#3f0300", "surface-container-high": "#eae8e7", "surface-container-lowest": "#ffffff",
            "background": "#fbf9f8", "inverse-primary": "#ffb4a6", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#1d1b19", "on-secondary": "#ffffff", "inverse-on-surface": "#f3f0f0",
            "secondary-fixed": "#ffdbca", "primary-container": "#ff7e67", "on-primary": "#ffffff",
            "on-tertiary-container": "#3c3a37", "on-secondary-fixed-variant": "#5c4132", "surface-variant": "#e4e2e1",
            "primary-fixed-dim": "#ffb4a6", "tertiary": "#615e5b"
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center antialiased">
  <main class="w-full max-w-[1200px] mx-auto px-6 h-full flex flex-col items-center justify-center pt-8 pb-16">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-primary mb-2">Delulu</h1>
      <p class="text-on-surface-variant">Connection before identity.</p>
    </div>
    
    <div class="glass-panel rounded-3xl p-8 w-full max-w-md ambient-shadow mx-auto">
      <div id="auth-tabs" class="flex gap-4 mb-6 border-b border-outline-variant/30 pb-2">
        <button id="tab-login" class="flex-1 font-bold text-primary border-b-2 border-primary pb-2">Login</button>
        <button id="tab-signup" class="flex-1 font-bold text-on-surface-variant pb-2">Sign Up</button>
      </div>

      <form id="auth-form" class="flex flex-col gap-4">
        <input id="auth-username" type="text" placeholder="Username" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none" required>
        <input id="auth-passcode" type="password" placeholder="Passcode (6+ chars)" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none" required minlength="6">
        
        <div id="signup-fields" class="hidden flex-col gap-4">
          <select id="auth-gender" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none">
            <option value="" disabled selected>I identify as...</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
          </select>
          <textarea id="auth-bio" placeholder="A short bio..." class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none resize-none h-24"></textarea>
          <input id="auth-hobbies" type="text" placeholder="Hobbies (comma separated)" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none">
          <input id="auth-photo" type="url" placeholder="Profile Photo URL (optional)" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none">
        </div>
        
        <p id="auth-error" class="text-error text-sm font-semibold hidden"></p>
        <button type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all mt-2">Continue</button>
      </form>
    </div>
  </main>
  
  <script src="/js/shared.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
