<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Delulu - Login</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#2b160a", "outline-variant": "#dec0ba", "on-surface": "#1b1c1c",
            "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#cbc5c2", "surface-bright": "#fbf9f8",
            "on-tertiary-fixed-variant": "#494644", "primary": "#a53b29", "surface-dim": "#dcd9d9",
            "on-primary-fixed-variant": "#842415", "tertiary-fixed": "#e7e1de", "error": "#ba1a1a",
            "error-container": "#ffdad6", "inverse-surface": "#303030", "on-surface-variant": "#57423e",
            "on-secondary-container": "#795a4a", "primary-fixed": "#ffdad4", "surface": "#fbf9f8",
            "outline": "#8b716d", "tertiary-container": "#a8a3a0", "on-primary-container": "#731709",
            "secondary-container": "#fdd4c0", "surface-container-low": "#f5f3f2", "surface-container": "#f0eded",
            "surface-tint": "#a53b29", "surface-container-highest": "#e4e2e1", "secondary-fixed-dim": "#e6beab",
            "on-background": "#1b1c1c", "on-error": "#ffffff", "secondary": "#765848",
            "on-primary-fixed": "#3f0300", "surface-container-high": "#eae8e7", "surface-container-lowest": "#ffffff",
            "background": "#fbf9f8", "inverse-primary": "#ffb4a6", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#1d1b19", "on-secondary": "#ffffff", "inverse-on-surface": "#f3f0f0",
            "secondary-fixed": "#ffdbca", "primary-container": "#ff7e67", "on-primary": "#ffffff",
            "on-tertiary-container": "#3c3a37", "on-secondary-fixed-variant": "#5c4132", "surface-variant": "#e4e2e1",
            "primary-fixed-dim": "#ffb4a6", "tertiary": "#615e5b"
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .otp-input {
      letter-spacing: 0.5em;
      font-size: 1.5rem;
      text-align: center;
      font-weight: 700;
    }
    .stage-enter {
      animation: fadeSlideIn 0.35s ease-out;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    .step-dot.active {
      background: #a53b29;
      width: 24px;
      border-radius: 4px;
    }
    .step-dot.completed {
      background: #842415;
    }
    .step-dot:not(.active):not(.completed) {
      background: #dec0ba;
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center antialiased">
  <main class="w-full max-w-[1200px] mx-auto px-6 h-full flex flex-col items-center justify-center pt-8 pb-16">

    <!-- Progress Dots -->
    <div class="flex items-center gap-2 mb-6">
      <div class="step-dot active" id="step-dot-1"></div>
      <div class="h-px w-8 bg-outline-variant" id="step-line-1"></div>
      <div class="step-dot" id="step-dot-2"></div>
      <div class="h-px w-8 bg-outline-variant" id="step-line-2"></div>
      <div class="step-dot" id="step-dot-3"></div>
    </div>

    <div class="text-center mb-6">
      <h1 class="text-5xl font-bold text-primary mb-2">Delulu</h1>
      <p class="text-on-surface-variant text-sm">Connection before identity.</p>
    </div>

    <div class="glass-panel rounded-3xl p-8 w-full max-w-md ambient-shadow mx-auto min-h-[320px]">

      <!-- ===== STAGE 1: Email Input ===== -->
      <div id="stage-email" class="stage-enter">
        <h2 class="text-xl font-bold text-on-surface mb-1">Sign in with your college email</h2>
        <p class="text-sm text-on-surface-variant mb-6">Only @rishihood.edu.in, @nst.rishihood.edu.in and @vitbhopal.ac.in emails are accepted</p>

        <form id="form-email" class="flex flex-col gap-4">
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
            <input 
              id="input-email" 
              type="email" 
              placeholder="you@college.edu.in" 
              class="w-full bg-surface-container-low rounded-xl pl-10 pr-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none"
              required
              autocomplete="email"
            >
          </div>
          <div class="flex items-center mt-2 pl-1">
            <input type="checkbox" id="remember-me" class="w-4 h-4 text-primary bg-surface-container border-outline rounded focus:ring-primary/50" checked>
            <label for="remember-me" class="ml-2 text-sm text-on-surface-variant">Remember me on this device</label>
          </div>
          <p id="email-error" class="text-error text-sm font-semibold hidden"></p>
          <button 
            type="submit" 
            id="btn-send-otp"
            class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all disabled:opacity-50"
          >
            Send OTP
          </button>
        </form>
      </div>

      <!-- ===== STAGE 2: OTP Input ===== -->
      <div id="stage-otp" class="hidden">
        <h2 class="text-xl font-bold text-on-surface mb-1">Check your email</h2>
        <p class="text-sm text-on-surface-variant mb-2">We sent a 6-digit code to</p>
        <p id="otp-email-display" class="text-sm font-semibold text-primary mb-6"></p>

        <form id="form-otp" class="flex flex-col gap-4">
          <input 
            id="input-otp" 
            type="text" 
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="6"
            placeholder="000000" 
            class="otp-input w-full bg-surface-container-low rounded-xl px-4 py-4 border-none focus:ring-2 focus:ring-primary/50 outline-none"
            required
            autocomplete="one-time-code"
          >
          <p id="otp-error" class="text-error text-sm font-semibold hidden"></p>
          <button 
            type="submit"
            id="btn-verify-otp"
            class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all disabled:opacity-50"
          >
            Verify OTP
          </button>
          <button 
            type="button" 
            id="btn-back-email" 
            class="text-sm text-on-surface-variant hover:text-primary transition-colors"
          >
            ← Use a different email
          </button>
        </form>
      </div>

      <!-- ===== STAGE 3: Complete Profile (new users only) ===== -->
      <div id="stage-profile" class="hidden">
        <h2 class="text-xl font-bold text-on-surface mb-1">Complete your profile</h2>
        <p class="text-sm text-on-surface-variant mb-6">Just a few more details to get started</p>

        <form id="form-profile" class="flex flex-col gap-4">
          <input 
            id="profile-username" 
            type="text" 
            placeholder="Choose a username" 
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none"
            required
            minlength="3"
          >
          <select id="profile-gender" class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none" required>
            <option value="" disabled selected>I identify as...</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
          </select>
          <textarea 
            id="profile-bio" 
            placeholder="A short bio..." 
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none resize-none h-24"
          ></textarea>
          <input 
            id="profile-hobbies" 
            type="text" 
            placeholder="Hobbies (comma separated)" 
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary/50 outline-none"
          >
          <div id="avatar-picker-container" class="hidden flex flex-col gap-2">
            <label class="text-sm font-bold text-on-surface-variant pl-2">Select Avatar</label>
            <div id="avatar-grid" class="grid grid-cols-5 gap-2 max-h-40 overflow-y-auto p-2 border border-outline-variant/30 rounded-xl bg-surface-container-low custom-scrollbar">
              <!-- Dynamically populated -->
            </div>
            <input type="hidden" id="profile-avatar" required>
          </div>
          <p id="profile-error" class="text-error text-sm font-semibold hidden"></p>
          <button 
            type="submit"
            class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all"
          >
            Create Profile
          </button>
        </form>
      </div>

    </div>
  </main>
  
  <script src="/js/shared.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
