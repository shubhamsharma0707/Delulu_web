<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Delulu - Discover</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#2b160a", "outline-variant": "#dec0ba", "on-surface": "#1b1c1c",
            "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#cbc5c2", "surface-bright": "#fbf9f8",
            "on-tertiary-fixed-variant": "#494644", "primary": "#a53b29", "surface-dim": "#dcd9d9",
            "on-primary-fixed-variant": "#842415", "tertiary-fixed": "#e7e1de", "error": "#ba1a1a",
            "error-container": "#ffdad6", "inverse-surface": "#303030", "on-surface-variant": "#57423e",
            "on-secondary-container": "#795a4a", "primary-fixed": "#ffdad4", "surface": "#fbf9f8",
            "outline": "#8b716d", "tertiary-container": "#a8a3a0", "on-primary-container": "#731709",
            "secondary-container": "#fdd4c0", "surface-container-low": "#f5f3f2", "surface-container": "#f0eded",
            "surface-tint": "#a53b29", "surface-container-highest": "#e4e2e1", "secondary-fixed-dim": "#e6beab",
            "on-background": "#1b1c1c", "on-error": "#ffffff", "secondary": "#765848",
            "on-primary-fixed": "#3f0300", "surface-container-high": "#eae8e7", "surface-container-lowest": "#ffffff",
            "background": "#fbf9f8", "inverse-primary": "#ffb4a6", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#1d1b19", "on-secondary": "#ffffff", "inverse-on-surface": "#f3f0f0",
            "secondary-fixed": "#ffdbca", "primary-container": "#ff7e67", "on-primary": "#ffffff",
            "on-tertiary-container": "#3c3a37", "on-secondary-fixed-variant": "#5c4132", "surface-variant": "#e4e2e1",
            "primary-fixed-dim": "#ffb4a6", "tertiary": "#615e5b"
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Add active state for navbar */
    #nav-discover, #mnav-discover {
      color: theme('colors.primary');
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col pt-20 md:pt-24 pb-20 md:pb-0 antialiased">
  
  <!-- TopAppBar -->
  <header id="global-header" class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-16 py-4 bg-surface/80 backdrop-blur-xl shadow-sm">
    <div class="text-2xl font-bold text-primary tracking-tight">Delulu</div>
    <nav class="hidden md:flex gap-8 items-center font-semibold text-sm">
      <a href="/discover" class="nav-link transition-colors" id="nav-discover">Discover</a>
      <a href="/requests" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-requests">Requests</a>
      <a href="/messages" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-messages">Messages</a>
      <a href="/profile" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-profile">Profile</a>
    </nav>
    <div class="flex items-center gap-4">
      <button id="logout-btn" class="text-on-surface-variant hover:text-primary text-sm font-semibold transition-colors">Logout</button>
      <div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30 bg-primary/20 flex items-center justify-center text-primary font-bold" id="header-avatar"></div>
    </div>
  </header>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/20">
    <a href="/discover" class="nav-link flex flex-col items-center transition-all" id="mnav-discover">
      <span class="material-symbols-outlined">explore</span><span class="text-[10px] mt-1 font-semibold">Discover</span>
    </a>
    <a href="/requests" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-requests">
      <span class="material-symbols-outlined">favorite</span><span class="text-[10px] mt-1 font-semibold">Requests</span>
    </a>
    <a href="/messages" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-messages">
      <span class="material-symbols-outlined">chat_bubble</span><span class="text-[10px] mt-1 font-semibold">Messages</span>
    </a>
    <a href="/profile" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-profile">
      <span class="material-symbols-outlined">person</span><span class="text-[10px] mt-1 font-semibold">Profile</span>
    </a>
  </nav>

  <main class="flex-grow flex flex-col w-full px-6 h-full relative" id="app-root">
    <div id="view-discovery" class="flex flex-col items-center justify-center min-h-[calc(100dvh-var(--header-h)-var(--bottomnav-h))] md:min-h-[calc(100dvh-var(--header-h-md))] w-full relative">
      <div id="discovery-empty" class="hidden text-center text-on-surface-variant flex-col items-center justify-center h-full">
        <span class="material-symbols-outlined text-6xl mb-4 text-outline-variant">explore_off</span>
        <h2 class="text-2xl font-bold mb-2">No more profiles</h2>
        <p>Check back later for new connections.</p>
      </div>
      
      <div class="relative w-full flex items-center group">
        <button id="btn-scroll-left" class="absolute left-2 z-20 w-12 h-12 rounded-full bg-surface-container shadow-md border border-outline-variant/30 flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all opacity-0 group-hover:opacity-100 hidden md:flex">
          <span class="material-symbols-outlined text-2xl">chevron_left</span>
        </button>
        
        <div id="discovery-rail" class="w-full overflow-x-auto overflow-y-hidden snap-x snap-mandatory flex gap-6 px-16 py-8 custom-scrollbar" style="perspective:1200px; scroll-behavior:smooth;">
          <!-- Cards injected via JS -->
        </div>

        <button id="btn-scroll-right" class="absolute right-2 z-20 w-12 h-12 rounded-full bg-surface-container shadow-md border border-outline-variant/30 flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all opacity-0 group-hover:opacity-100 hidden md:flex">
          <span class="material-symbols-outlined text-2xl">chevron_right</span>
        </button>
      </div>

    </div>
  </main>
  
  <script src="/js/shared.js"></script>
  <script src="/js/discover.js"></script>
</body>
</html>
