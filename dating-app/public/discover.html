<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <script>(function(){if(localStorage.getItem('delulu_theme')==='dark'){document.documentElement.classList.add('dark');document.documentElement.style.backgroundColor='#121313';}})();</script>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Delulu - Discover</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="dns-prefetch" href="//cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#2b160a", "outline-variant": "#dec0ba", "on-surface": "#1b1c1c",
            "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#cbc5c2", "surface-bright": "#fbf9f8",
            "on-tertiary-fixed-variant": "#494644", "primary": "#a53b29", "surface-dim": "#dcd9d9",
            "on-primary-fixed-variant": "#842415", "tertiary-fixed": "#e7e1de", "error": "#ba1a1a",
            "error-container": "#ffdad6", "inverse-surface": "#303030", "on-surface-variant": "#57423e",
            "on-secondary-container": "#795a4a", "primary-fixed": "#ffdad4", "surface": "#fbf9f8",
            "outline": "#8b716d", "tertiary-container": "#a8a3a0", "on-primary-container": "#731709",
            "secondary-container": "#fdd4c0", "surface-container-low": "#f5f3f2", "surface-container": "#f0eded",
            "surface-tint": "#a53b29", "surface-container-highest": "#e4e2e1", "secondary-fixed-dim": "#e6beab",
            "on-background": "#1b1c1c", "on-error": "#ffffff", "secondary": "#765848",
            "on-primary-fixed": "#3f0300", "surface-container-high": "#eae8e7", "surface-container-lowest": "#ffffff",
            "background": "#fbf9f8", "inverse-primary": "#ffb4a6", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#1d1b19", "on-secondary": "#ffffff", "inverse-on-surface": "#f3f0f0",
            "secondary-fixed": "#ffdbca", "primary-container": "#ff7e67", "on-primary": "#ffffff",
            "on-tertiary-container": "#3c3a37", "on-secondary-fixed-variant": "#5c4132", "surface-variant": "#e4e2e1",
            "primary-fixed-dim": "#ffb4a6", "tertiary": "#615e5b"
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <script type="speculationrules">
    {
      "prefetch": [
        {
          "where": {
            "and": [
              { "href_matches": "/*" },
              { "not": { "href_matches": "/logout" } },
              { "not": { "href_matches": "/api/*" } }
            ]
          },
          "eagerness": "eager"
        }
      ],
      "prerender": [
        {
          "where": {
            "and": [
              { "href_matches": "/*" },
              { "not": { "href_matches": "/logout" } },
              { "not": { "href_matches": "/api/*" } }
            ]
          },
          "eagerness": "moderate"
        }
      ]
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=243">
  <style>
    /* Add active state for navbar */
    #nav-discover, #mnav-discover {
      color: theme('colors.primary');
    }
  </style>
</head>
<body class="discover-page bg-background text-on-background min-h-screen flex flex-col pt-20 md:pt-24 pb-20 md:pb-0 antialiased">
  
  <header id="global-header" class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-16 py-3 md:py-4 bg-surface/80 backdrop-blur-xl shadow-sm">
    <div class="flex items-center gap-2 font-bold text-2xl text-primary tracking-tight">
      <img src="logo.png" class="w-7 h-7 rounded-lg object-cover" alt="Delulu">
      <span>Delulu</span>
    </div>
    <nav class="hidden md:flex gap-8 items-center font-semibold text-sm">
      <a href="discover.html" class="nav-link transition-colors" id="nav-discover">Meet People</a>
      <a href="requests.html" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-requests">Invites</a>
      <a href="messages.html" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-messages">Messages</a>
      <a href="profile.html" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-profile">Profile</a>
    </nav>
    <div class="flex items-center gap-2">
      <button id="theme-toggle" class="w-9 h-9 rounded-full text-on-surface-variant hover:text-primary flex items-center justify-center transition-colors" title="Toggle theme" aria-label="Toggle dark mode theme">
        <span class="material-symbols-outlined text-sm">dark_mode</span>
      </button>
      <button id="logout-btn" class="text-on-surface-variant hover:text-primary text-sm font-semibold transition-colors" aria-label="Logout account">Logout</button>
      <div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30 bg-primary/20 flex items-center justify-center text-primary font-bold" id="header-avatar" aria-label="User Avatar"></div>
    </div>
  </header>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/20" aria-label="Mobile Navigation">
    <a href="discover.html" class="nav-link flex flex-col items-center transition-all" id="mnav-discover" aria-label="Discover People">
      <span class="material-symbols-outlined">explore</span><span class="text-[10px] mt-1 font-semibold">People</span>
    </a>
    <a href="requests.html" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-requests" aria-label="Connection Invites">
      <span class="material-symbols-outlined">person_add</span><span class="text-[10px] mt-1 font-semibold">Invites</span>
    </a>
    <a href="messages.html" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-messages" aria-label="Messages">
      <span class="material-symbols-outlined">chat_bubble</span><span class="text-[10px] mt-1 font-semibold">Messages</span>
    </a>
    <a href="profile.html" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-profile" aria-label="User Profile">
      <span class="material-symbols-outlined">person</span><span class="text-[10px] mt-1 font-semibold">Profile</span>
    </a>
  </nav>

  <main class="flex-grow flex flex-col w-full h-full relative" id="app-root">
    <!-- Section Header -->
    <div class="w-full px-6 md:px-16 pt-1 pb-1 md:pt-2 md:pb-2 flex items-center justify-between">
      <div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-on-surface">Meet People</h1>
        <p class="text-sm font-medium text-on-surface-variant">Find classmates to talk to, vibe with, or maybe grow closer to</p>
      </div>
      <div class="hidden md:flex items-center gap-2 text-sm text-on-surface-variant font-medium">
        <span class="material-symbols-outlined text-base">touch_app</span>
        <span>Scroll to explore</span>
      </div>
    </div>

    <div id="view-discovery" class="flex-grow flex flex-col items-center justify-center w-full relative overflow-visible">
      <div id="discovery-empty" class="hidden text-center text-on-surface-variant flex-col items-center justify-center h-full px-6">
        <span class="material-symbols-outlined text-7xl mb-4 text-outline-variant">explore_off</span>
        <h2 class="text-2xl font-bold mb-2">No more people right now</h2>
        <p class="text-on-surface-variant/70">Check back later for new classmates to meet.</p>
      </div>
      
      <!-- 3D Scene Container -->
      <div id="avatar-3d-container" class="w-full relative cursor-grab active:cursor-grabbing mt-2">
        <!-- CSS avatar carousel injected here -->
      </div>
      
      <!-- Profile Info Overlay (shows for the center card) -->
      <div id="profile-overlay" class="flex w-full justify-center mt-1 px-6">
        <div id="center-profile-info" class="text-center max-w-md mx-auto fade-in flex flex-col items-center">
          <h2 id="center-username" class="font-extrabold text-3xl md:text-4xl capitalize text-on-surface"></h2>
          <p id="center-bio" class="text-base md:text-lg text-on-surface-variant font-medium mt-2 leading-relaxed line-clamp-2 md:line-clamp-3"></p>
          <div id="center-hobbies" class="flex flex-wrap gap-2 justify-center mt-3"></div>
          
          <!-- Connect Button Only -->
          <div class="flex justify-center mt-4 mb-2">
            <button id="btn-discover-connect" class="px-8 py-3 rounded-full btn-primary bg-primary text-white text-sm font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2 cursor-pointer" aria-label="Say Hi to classmate">
              <span class="material-symbols-outlined text-lg text-white material-fill">handshake</span>
              <span class="text-white">Say Hi</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Scroll Buttons -->
      <button id="btn-scroll-left" class="fixed left-4 top-1/2 z-40 w-12 h-12 rounded-full bg-surface/90 backdrop-blur-lg shadow-xl border border-outline-variant/30 flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all hover:shadow-2xl" aria-label="Previous profile">
        <span class="material-symbols-outlined text-3xl">chevron_left</span>
      </button>
      <button id="btn-scroll-right" class="fixed right-4 top-1/2 z-40 w-12 h-12 rounded-full bg-surface/90 backdrop-blur-lg shadow-xl border border-outline-variant/30 flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all hover:shadow-2xl" aria-label="Next profile">
        <span class="material-symbols-outlined text-3xl">chevron_right</span>
      </button>
    </div>
  </main>
  
  <script src="js/shared.js?v=243"></script>
  <script src="js/discover.js?v=243"></script>
  <script src="js/avatar3d.js?v=500"></script>
</body>
</html>
