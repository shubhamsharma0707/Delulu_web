<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Delulu - Profile</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="dns-prefetch" href="//cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#2b160a", "outline-variant": "#dec0ba", "on-surface": "#1b1c1c",
            "on-tertiary": "#ffffff", "tertiary-fixed-dim": "#cbc5c2", "surface-bright": "#fbf9f8",
            "on-tertiary-fixed-variant": "#494644", "primary": "#a53b29", "surface-dim": "#dcd9d9",
            "on-primary-fixed-variant": "#842415", "tertiary-fixed": "#e7e1de", "error": "#ba1a1a",
            "error-container": "#ffdad6", "inverse-surface": "#303030", "on-surface-variant": "#57423e",
            "on-secondary-container": "#795a4a", "primary-fixed": "#ffdad4", "surface": "#fbf9f8",
            "outline": "#8b716d", "tertiary-container": "#a8a3a0", "on-primary-container": "#731709",
            "secondary-container": "#fdd4c0", "surface-container-low": "#f5f3f2", "surface-container": "#f0eded",
            "surface-tint": "#a53b29", "surface-container-highest": "#e4e2e1", "secondary-fixed-dim": "#e6beab",
            "on-background": "#1b1c1c", "on-error": "#ffffff", "secondary": "#765848",
            "on-primary-fixed": "#3f0300", "surface-container-high": "#eae8e7", "surface-container-lowest": "#ffffff",
            "background": "#fbf9f8", "inverse-primary": "#ffb4a6", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#1d1b19", "on-secondary": "#ffffff", "inverse-on-surface": "#f3f0f0",
            "secondary-fixed": "#ffdbca", "primary-container": "#ff7e67", "on-primary": "#ffffff",
            "on-tertiary-container": "#3c3a37", "on-secondary-fixed-variant": "#5c4132", "surface-variant": "#e4e2e1",
            "primary-fixed-dim": "#ffb4a6", "tertiary": "#615e5b"
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] }
        }
      }
    };
  </script>
  <script type="speculationrules">
    {
      "prefetch": [
        {
          "where": {
            "and": [
              { "href_matches": "/*" },
              { "not": { "href_matches": "/logout" } },
              { "not": { "href_matches": "/api/*" } }
            ]
          },
          "eagerness": "eager"
        }
      ],
      "prerender": [
        {
          "where": {
            "and": [
              { "href_matches": "/*" },
              { "not": { "href_matches": "/logout" } },
              { "not": { "href_matches": "/api/*" } }
            ]
          },
          "eagerness": "moderate"
        }
      ]
    }
  </script>
  <link rel="stylesheet" href="/styles.css?v=99">
  <style>
    #nav-profile, #mnav-profile {
      color: theme('colors.primary');
    }
  </style>
</head>
<body class="profile-page bg-background text-on-background min-h-screen flex flex-col pt-20 md:pt-24 pb-20 md:pb-0 antialiased">
  
  <header id="global-header" class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-16 py-4 bg-surface/80 backdrop-blur-xl shadow-sm">
    <div class="text-2xl font-bold text-primary tracking-tight">Delulu</div>
    <nav class="hidden md:flex gap-8 items-center font-semibold text-sm">
      <a href="/discover" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-discover">Discover</a>
      <a href="/requests" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-requests">Requests</a>
      <a href="/messages" class="nav-link text-on-surface-variant hover:text-primary transition-colors" id="nav-messages">Messages</a>
      <a href="/profile" class="nav-link transition-colors" id="nav-profile">Profile</a>
    </nav>
    <div class="flex items-center gap-2">
      <button id="theme-toggle" class="w-9 h-9 rounded-full text-on-surface-variant hover:text-primary flex items-center justify-center transition-colors" title="Toggle theme">
        <span class="material-symbols-outlined text-sm">dark_mode</span>
      </button>
      <button id="logout-btn" class="text-on-surface-variant hover:text-primary text-sm font-semibold transition-colors">Logout</button>
      <div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30 bg-primary/20 flex items-center justify-center text-primary font-bold" id="header-avatar"></div>
    </div>
  </header>

  <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/20">
    <a href="/discover" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-discover">
      <span class="material-symbols-outlined">explore</span><span class="text-[10px] mt-1 font-semibold">Discover</span>
    </a>
    <a href="/requests" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-requests">
      <span class="material-symbols-outlined">favorite</span><span class="text-[10px] mt-1 font-semibold">Requests</span>
    </a>
    <a href="/messages" class="nav-link flex flex-col items-center text-on-surface-variant hover:text-primary transition-all" id="mnav-messages">
      <span class="material-symbols-outlined">chat_bubble</span><span class="text-[10px] mt-1 font-semibold">Messages</span>
    </a>
    <a href="/profile" class="nav-link flex flex-col items-center transition-all" id="mnav-profile">
      <span class="material-symbols-outlined">person</span><span class="text-[10px] mt-1 font-semibold">Profile</span>
    </a>
  </nav>

  <main class="flex-grow flex flex-col w-full px-6 relative" id="app-root">
    <div class="w-full max-w-5xl mx-auto pt-0 pb-0">
      <h1 class="text-xl md:text-2xl font-bold text-primary mb-2 mt-2">My Profile</h1>
      
      <div class="relative w-full min-h-[460px] md:flex md:flex-row md:items-center md:justify-between md:gap-6">
        <!-- Left Column: Form -->
        <div class="w-full md:w-[60%] lg:w-[64%] max-w-[660px] flex-shrink-0 glass-panel p-5 rounded-3xl ambient-shadow relative overflow-hidden z-10">
          <!-- Decoration -->
          <div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
          <div class="absolute -bottom-12 -left-12 w-32 h-32 bg-secondary/10 rounded-full blur-2xl"></div>
        
          <form id="profile-form" class="relative z-10 flex flex-col gap-3">
            <div class="flex items-center gap-4 mb-1">
              <div id="prof-avatar" class="w-20 h-20 rounded-full bg-primary-container text-white flex items-center justify-center overflow-hidden border-2 border-outline-variant/30 text-4xl shadow-sm relative"></div>
              <div>
                <h2 id="prof-username" class="text-2xl font-bold text-on-surface capitalize">...</h2>
                <p class="text-sm text-on-surface-variant font-semibold mt-1">Identity protected</p>
              </div>
            </div>
            
            <div class="space-y-1">
              <label class="text-sm font-bold text-on-surface-variant pl-2">Bio</label>
              <textarea id="prof-bio" class="w-full bg-surface-container-low rounded-xl px-4 py-2 border-none focus:ring-2 focus:ring-primary/50 outline-none resize-none" placeholder="Tell them about you..."></textarea>
            </div>
            
            <div class="space-y-1">
              <label class="text-sm font-bold text-on-surface-variant pl-2">Hobbies (comma separated)</label>
              <input id="prof-hobbies" type="text" class="w-full bg-surface-container-low rounded-xl px-4 py-2 border-none focus:ring-2 focus:ring-primary/50 outline-none" placeholder="e.g. reading, hiking, coffee">
            </div>
            
            <div class="space-y-1">
              <label class="text-sm font-bold text-on-surface-variant pl-2">Select Avatar</label>
              <div id="prof-avatar-grid" class="grid grid-cols-6 gap-2 overflow-y-auto p-2 border border-outline-variant/30 rounded-xl bg-surface-container-low custom-scrollbar">
                <!-- Dynamically populated -->
              </div>
              <input type="hidden" id="prof-avatar-input" required>
            </div>
            
            <p id="prof-msg" class="text-sm font-semibold hidden"></p>
            <button type="submit" class="w-full mt-1 bg-gradient-to-r from-primary to-primary-container text-white font-bold py-2 rounded-xl shadow-md hover:shadow-lg transition-all text-sm">Save Changes</button>
          </form>
        </div>
        
        <!-- Right Column: 3D Preview (No card, borderless, transparent, absolutely positioned) -->
        <div id="profile-3d-preview-container" class="absolute right-0 bottom-0 md:right-8 md:bottom-4 z-0 pointer-events-none opacity-85 md:opacity-100 flex items-center justify-center">
          <div id="profile-3d-preview" class="relative flex items-center justify-center">
            <!-- Injected via JS -->
          </div>
        </div>
      </div>
      
    </div>
  </div>
  </main>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="preload" href="/js/shared.js?v=18" as="script">
  <script src="/js/shared.js?v=18"></script>
  <script src="/js/profile.js?v=18"></script>
</body>
</html>
