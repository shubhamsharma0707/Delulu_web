<!DOCTYPE html>

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: theme('colors.surface-bright');
            color: theme('colors.on-surface');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: theme('colors.surface-variant');
            border-radius: 10px;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col pt-20 md:pt-24 pb-20 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl shadow-sm shadow-primary/10 hidden md:flex">
<div class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed-dim">
            Delulu
        </div>
<nav class="flex gap-8 items-center">
<a class="font-label-md text-label-md text-primary dark:text-primary-fixed-dim border-b-2 border-primary pb-1 hover:bg-primary/5 transition-colors duration-200" href="#">Discover</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:text-primary hover:bg-primary/5 transition-colors duration-200" href="#">Messages</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-outline-variant hover:text-primary hover:bg-primary/5 transition-colors duration-200" href="#">My Profile</a>
</nav>
<div class="flex items-center gap-4 text-primary dark:text-primary-fixed-dim">
<button class="hover:bg-primary/5 p-2 rounded-full transition-colors duration-200 flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="hover:bg-primary/5 p-2 rounded-full transition-colors duration-200 flex items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</button>
<img alt="User profile thumbnail" class="w-10 h-10 rounded-full object-cover border border-outline-variant" data-alt="A small circular profile thumbnail image of a smiling young woman with soft lighting, matching the modern optimistic dating app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkEq3VcqeDmrUOG5Hc5dU_TbtIOm8PWUHeDhiUwJNM_SgO9PDHK1gu-MCooA8v9uamv3QXJGypsEJYxXEFluL-85FIy6MO9YhZPWoOr18aM35VggMHKpSCYt2fSCKzuZFcisN0bkXDD4cLX-A2Il_jjofBbtnOMl9_mdecwxTv6NNvQTz8AYJxH8Y2QE45bSM0pVabslYDve39g7LwEOm9gfMnhYv-Yy8u46CIVUHgfZxL-Tnd-OkNLlcXVPWA4-blJVViqGFJdar6"/>
</div>
</header>
<!-- Main Content Layout -->
<main class="flex-grow flex flex-col md:flex-row max-w-container-max mx-auto w-full px-margin-mobile md:px-margin-desktop gap-gutter h-[calc(100vh-6rem)]">
<!-- Sidebar Filters (Desktop) -->
<aside class="hidden md:flex flex-col w-72 flex-shrink-0 bg-surface-container-low rounded-xl p-6 h-full overflow-y-auto custom-scrollbar shadow-[0_4px_24px_rgba(165,59,41,0.05)] border border-outline-variant/30">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-8">Filters</h2>
<div class="space-y-8">
<!-- Distance -->
<div>
<div class="flex justify-between items-center mb-4">
<label class="font-label-md text-label-md text-on-surface-variant">Distance</label>
<span class="font-label-sm text-label-sm text-primary">15 km</span>
</div>
<input class="w-full h-2 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary" max="100" min="1" type="range" value="15"/>
</div>
<!-- Age -->
<div>
<div class="flex justify-between items-center mb-4">
<label class="font-label-md text-label-md text-on-surface-variant">Age</label>
<span class="font-label-sm text-label-sm text-primary">22 - 35</span>
</div>
<div class="relative w-full h-2 bg-surface-variant rounded-lg">
<div class="absolute h-full bg-primary rounded-lg" style="left: 20%; right: 40%;"></div>
<div class="absolute w-4 h-4 bg-primary rounded-full -top-1 shadow cursor-pointer" style="left: 20%;"></div>
<div class="absolute w-4 h-4 bg-primary rounded-full -top-1 shadow cursor-pointer" style="left: 60%;"></div>
</div>
</div>
<!-- Interests -->
<div>
<label class="font-label-md text-label-md text-on-surface-variant block mb-4">Interests</label>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 bg-primary-container text-on-primary-container font-label-sm text-label-sm rounded-full cursor-pointer hover:bg-primary hover:text-white transition-colors">Photography</span>
<span class="px-4 py-2 bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full cursor-pointer hover:bg-secondary-container transition-colors">Travel</span>
<span class="px-4 py-2 bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full cursor-pointer hover:bg-secondary-container transition-colors">Coffee</span>
<span class="px-4 py-2 bg-primary-container text-on-primary-container font-label-sm text-label-sm rounded-full cursor-pointer hover:bg-primary hover:text-white transition-colors">Art</span>
<span class="px-4 py-2 bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full cursor-pointer hover:bg-secondary-container transition-colors">Music</span>
</div>
</div>
</div>
<div class="mt-auto pt-8">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-label-md text-label-md py-4 rounded-full shadow-sm hover:shadow-md transition-all">Apply Filters</button>
</div>
</aside>
<!-- Discovery Feed (Canvas) -->
<section class="flex-grow relative h-full flex flex-col items-center justify-center">
<!-- Card Stack Container -->
<div class="relative w-full max-w-md aspect-[3/4] mx-auto perspective-1000">
<!-- Background Card (Next Profile) -->
<div class="absolute inset-0 bg-surface-container rounded-xl shadow-sm transform scale-95 translate-y-4 opacity-50 transition-all duration-300">
<div class="w-full h-full bg-cover bg-center rounded-xl" data-alt="A softly lit portrait of a young man smiling in a coffee shop, golden hour lighting, modern optimistic aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB0HYDAeCDt9ReUdjzIda1HiK83r81bBt8gW1Rsg2Z0WIFLkHYdHq93GnZFpkOo2VnETW5i6yovU-_OjZL-rMx-7Yx4Z5NymV-6cEyZf50DgEjg_Gul0Z2tAEmr99f7Unvy4Unra0gYNZcI6co8sxukQhbnJBXgNsWZ16n2aC_O93rnFz-1pmjREHEdXdsdqPmHAWd--iLr4dRjWV9cFRfMXAyuzqUEqWuayrWv8SkNuCgJENAXmL0QMzsDAo993dnrKyxjpaxzgIw-')"></div>
</div>
<!-- Foreground Card (Current Profile) -->
<div class="absolute inset-0 bg-surface rounded-xl shadow-[0_8px_32px_rgba(165,59,41,0.1)] overflow-hidden flex flex-col relative z-10 cursor-grab active:cursor-grabbing transform transition-transform duration-300 hover:scale-[1.02]">
<!-- Profile Image -->
<div class="w-full h-full bg-cover bg-center absolute inset-0" data-alt="A beautiful, soft-focus full body shot of a young woman laughing in a sunlit park, golden hour light, wearing a casual stylish outfit, evoking a safe, optimistic dating app feeling." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCyzyHselmOK4Wgt__n3sbPZRHEUJLb5Af-1oNcU5bmZooSdLf1MfpIFwad52ArUxeJpny966qQt8QIBGhT3FC2HVhofSLheAsHBfxMjLaPxAoJyX9T2QKcts5__FLdg8Tcc7WAsKCgUVROIVDBdPY-zq8o_uoN6Eir4rb_E29p0IKJ8fmLEjB-RX20bpkHURCUYGWZHEYMms8uLKa7omiRvG4co9Ulhg8lpvQp7NaZYwxw-MvcHQIIqZCkSn9r5F3aNYCudqe3QPiH')"></div>
<!-- Gradient Overlay -->
<div class="absolute inset-x-0 bottom-0 h-2/3 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
<!-- Profile Info -->
<div class="absolute bottom-0 left-0 w-full p-6 text-white flex flex-col justify-end">
<div class="flex items-end justify-between mb-2">
<div>
<h1 class="font-headline-lg text-headline-lg font-bold">Sophia, 24</h1>
<p class="font-body-md text-body-md opacity-90 flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">location_on</span>
                                    2 miles away
                                </p>
</div>
<button class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-white">info</span>
</button>
</div>
<div class="flex flex-wrap gap-2 mt-3 mb-6">
<span class="px-3 py-1 bg-white/20 backdrop-blur-md rounded-full font-label-sm text-label-sm">Art Gallery</span>
<span class="px-3 py-1 bg-white/20 backdrop-blur-md rounded-full font-label-sm text-label-sm">Matcha</span>
<span class="px-3 py-1 bg-white/20 backdrop-blur-md rounded-full font-label-sm text-label-sm">Hiking</span>
</div>
<!-- Action Buttons -->
<div class="flex justify-center items-center gap-6 mt-4">
<button class="w-16 h-16 rounded-full bg-surface-container-highest text-primary flex items-center justify-center shadow-lg hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<button class="w-14 h-14 rounded-full bg-secondary-container text-primary flex items-center justify-center shadow-lg hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="w-16 h-16 rounded-full bg-gradient-to-tr from-primary to-primary-container text-white flex items-center justify-center shadow-lg hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</div>
</div>
</div>
<!-- Mobile Quick Filters (Pill) -->
<div class="md:hidden absolute top-4 left-1/2 transform -translate-x-1/2 flex gap-2">
<button class="px-4 py-2 bg-surface/90 backdrop-blur-md rounded-full shadow-sm text-on-surface font-label-sm text-label-sm flex items-center gap-1 border border-outline-variant/30">
<span class="material-symbols-outlined text-sm">tune</span> Filters
                 </button>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface/80 dark:bg-surface-container-highest/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(165,59,41,0.08)] rounded-t-lg">
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-full px-6 py-2 scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-label-sm text-label-sm mt-1">Discover</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-secondary-container/50 transition-all" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-label-sm text-label-sm mt-1">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-secondary-container/50 transition-all" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm mt-1">Profile</span>
</a>
</nav>
</body></html>
